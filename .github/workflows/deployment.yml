name: Deployment Workflow
run-name: '[${{ github.ref_name }}] ${{ github.event.head_commit.message }}'

on:
  push:
    branches: [ "main", "updates" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile
          push: true
          tags: | 
            ghcr.io/ensslinadrian/adrian-portfolio-docusaurus:latest
            ghcr.io/ensslinadrian/adrian-portfolio-docusaurus:${{ github.sha }}


      - name: Create and Copy .env to VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script: |
            cat << 'EOF' > ~/${{ secrets.PROJECT_PATH }}/.env
            ${{ secrets.ENV_FILE }}
            EOF
            chmod 600 ~/${{ secrets.PROJECT_PATH }}/.env


      - name: Copy Docker Compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          source: ./docker-compose.yml
          target: ~/${{ secrets.PROJECT_PATH }}


      - name: Deploy Application on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT }}
          script: |
            set -e
            cd ~/${{ secrets.PROJECT_PATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose down
            docker compose up -d --force-recreate
            docker image prune -f

            docker logout ghcr.io